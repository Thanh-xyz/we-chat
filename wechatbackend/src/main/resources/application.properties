spring.application.name=wechat
spring.config.import=optional:file:.env[.properties],optional:file:wechatbackend/.env[.properties]

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET:change-this-dev-secret-change-this-dev-secret}
app.jwt.issuer=${JWT_ISSUER:wechat}
app.jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL:PT15M}
app.jwt.refresh-token-ttl=${JWT_REFRESH_TOKEN_TTL:P30D}

app.rbac.default-user-role=${DEFAULT_USER_ROLE:USER}
app.rbac.super-admin-role=${SUPER_ADMIN_ROLE:SUPER_ADMIN}

app.rate-limit.auth-login.capacity=${RATE_LIMIT_AUTH_LOGIN_CAPACITY:5}
app.rate-limit.auth-login.refill-minutes=${RATE_LIMIT_AUTH_LOGIN_REFILL_MINUTES:1}
app.rate-limit.auth-refresh.capacity=${RATE_LIMIT_AUTH_REFRESH_CAPACITY:20}
app.rate-limit.auth-refresh.refill-minutes=${RATE_LIMIT_AUTH_REFRESH_REFILL_MINUTES:1}
app.rate-limit.auth-register.capacity=${RATE_LIMIT_AUTH_REGISTER_CAPACITY:5}
app.rate-limit.auth-register.refill-minutes=${RATE_LIMIT_AUTH_REGISTER_REFILL_MINUTES:1}
app.rate-limit.message-send.capacity=${RATE_LIMIT_MESSAGE_SEND_CAPACITY:60}
app.rate-limit.message-send.refill-minutes=${RATE_LIMIT_MESSAGE_SEND_REFILL_MINUTES:1}
app.rate-limit.websocket-connect.capacity=${RATE_LIMIT_WEBSOCKET_CONNECT_CAPACITY:20}
app.rate-limit.websocket-connect.refill-minutes=${RATE_LIMIT_WEBSOCKET_CONNECT_REFILL_MINUTES:1}

app.security.max-failed-login-attempts=${MAX_FAILED_LOGIN_ATTEMPTS:5}
app.security.lock-duration=${LOCK_DURATION:PT15M}

app.websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

logging.level.main.com.chat.wechat=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF

server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
