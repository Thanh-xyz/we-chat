spring.application.name=wechat
spring.config.import=optional:file:.env[.properties],optional:file:wechatbackend/.env[.properties]

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET:change-this-dev-secret-change-this-dev-secret}
app.jwt.issuer=${JWT_ISSUER:wechat}
app.jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL:PT15M}
app.jwt.refresh-token-ttl=${JWT_REFRESH_TOKEN_TTL:P30D}

app.rbac.default-user-role=${DEFAULT_USER_ROLE:USER}
app.rbac.super-admin-role=${SUPER_ADMIN_ROLE:SUPER_ADMIN}

logging.level.main.com.chat.wechat=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-binding-errors=always
